<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yo! Noid: Harbor Cheese</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
        }

        #game-container {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 4px solid #ff4d4d;
            border-radius: 8px;
            background: #000;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #ffcc00;
        }

        .score-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #score {
            font-size: 18px;
            color: #ffcc00;
        }

        #instructions {
            margin-top: 20px;
            font-size: 10px;
            text-align: center;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="hud">
        <div class="score-container">
            <span>PEPPERONIS: </span>
            <span id="score">0</span>
        </div>
    </div>
    <div id="instructions">
        <p>Setas/WASD: Mover | Espaço: Pulo Duplo | K ou SHIFT: Ioiô (Grappling Hook)</p>
    </div>

    <script type="module" src="main.js"></script>

</body>

</html>
