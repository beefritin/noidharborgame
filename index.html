<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yo! Noid: Harbor Cheese</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
        }

        #game-container {
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 4px solid #ff4d4d;
            border-radius: 8px;
            background: #000;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #ffcc00;
        }

        .score-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #score {
            font-size: 18px;
            color: #ffcc00;
        }

        #instructions {
            margin-top: 20px;
            font-size: 10px;
            text-align: center;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>

<body>
    <div id="game-container"></div>
    <div id="hud">
        <div class="score-container">
            <span>PEPPERONIS: </span>
            <span id="score">0</span>
        </div>
    </div>
    <div id="instructions">
        <p>Setas/WASD: Mover | Espaço: Pulo Duplo | K ou SHIFT: Ioiô (Grappling Hook)</p>
    </div>

    <script>
        // Game Configuration
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'matter',
                matter: { gravity: { y: 1 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let pGraphic;
        let cursors;
        let score = 0;
        let scoreText;
        let pepGroup = [];
        let keys;

        function preload() {
            // No assets for now to avoid 404 blockages
        }

        function create() {
            const scene = this;
            scoreText = document.getElementById('score');

            // Background
            this.add.rectangle(400, 300, 800, 600, 0x1a2b3c).setScrollFactor(0);
            this.add.rectangle(400, 580, 800, 40, 0x0077be).setScrollFactor(0); // Water

            this.matter.world.setBounds(0, 0, 2000, 600);

            // Platforms
            createPlatform(this, 100, 500, 200, 40, 0x8b4513);
            createPlatform(this, 1800, 500, 400, 40, 0x8b4513);

            // Boats
            createBoat(this, 500, 450, 150, 40, 0x00aaff, 200, 0);
            createBoat(this, 1000, 400, 150, 40, 0x00aaff, 0, 150);
            createBoat(this, 1500, 350, 150, 40, 0x00aaff, 100, 0);

            // Anchors
            createAnchor(this, 300, 200);
            createAnchor(this, 750, 150);
            createAnchor(this, 1200, 200);

            // Pepperonis
            spawnPep(this, 500, 350);
            spawnPep(this, 1000, 250);
            spawnPep(this, 1500, 200);

            // Player Setup
            const rect = this.add.rectangle(100, 400, 32, 48, 0xff4d4d);
            player = this.matter.add.gameObject(rect);
            player.setFixedRotation();
            player.setFriction(0.01);

            // Grappling Hook vars
            player.isGrappling = false;
            player.constraint = null;
            player.line = this.add.graphics();

            // Input
            cursors = this.input.keyboard.createCursorKeys();
            keys = this.input.keyboard.addKeys('W,A,S,D,K,SHIFT');

            // Camera
            this.cameras.main.setBounds(0, 0, 2000, 600);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);
        }

        function update() {
            if (!player) return;

            // Horizontal Movement
            if (cursors.left.isDown || keys.A.isDown) {
                player.applyForce({ x: -0.002, y: 0 });
            } else if (cursors.right.isDown || keys.D.isDown) {
                player.applyForce({ x: 0.002, y: 0 });
            }

            // Jump
            if (Phaser.Input.Keyboard.JustDown(cursors.space) || Phaser.Input.Keyboard.JustDown(keys.W)) {
                player.setVelocityY(-10);
            }

            // Grappling Hook
            if (Phaser.Input.Keyboard.JustDown(keys.K) || Phaser.Input.Keyboard.JustDown(keys.SHIFT)) {
                startGrapple(this);
            }
            if (Phaser.Input.Keyboard.JustUp(keys.K) || Phaser.Input.Keyboard.JustUp(keys.SHIFT)) {
                stopGrapple(this);
            }

            // Draw Line
            player.line.clear();
            if (player.isGrappling && player.anchor) {
                player.line.lineStyle(2, 0xffffff);
                player.line.lineBetween(player.x, player.y, player.anchor.x, player.anchor.y);

                // Swing momentum
                if (cursors.left.isDown || keys.A.isDown) player.applyForce({ x: -0.001, y: 0 });
                if (cursors.right.isDown || keys.D.isDown) player.applyForce({ x: 0.001, y: 0 });
            }

            // Collection
            pepGroup.forEach((pep, index) => {
                if (pep && Phaser.Math.Distance.Between(player.x, player.y, pep.x, pep.y) < 40) {
                    pep.destroy();
                    pepGroup.splice(index, 1);
                    score += 10;
                    scoreText.innerText = score;
                }
            });
        }

        function createPlatform(scene, x, y, w, h, color) {
            const p = scene.add.rectangle(x, y, w, h, color);
            scene.matter.add.gameObject(p, { isStatic: true });
        }

        function createBoat(scene, x, y, w, h, color, mx, my) {
            const b = scene.add.rectangle(x, y, w, h, color);
            scene.matter.add.gameObject(b, { isStatic: true });
            scene.tweens.add({
                targets: b, x: x + mx, y: y + my,
                duration: 3000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
                onUpdate: () => { b.setX(b.x); b.setY(b.y); }
            });
        }

        function createAnchor(scene, x, y) {
            const a = scene.add.circle(x, y, 10, 0xffcc00);
            scene.matter.add.gameObject(a, { isStatic: true, label: 'anchor' });
        }

        function spawnPep(scene, x, y) {
            const p = scene.add.circle(x, y, 8, 0xff3300);
            pepGroup.push(p);
            scene.tweens.add({ targets: p, y: y - 10, duration: 1500, yoyo: true, repeat: -1 });
        }

        function startGrapple(scene) {
            const bodies = scene.matter.world.localWorld.bodies;
            let nearest = null;
            let minDist = 350;

            bodies.forEach(body => {
                if (body.label === 'anchor') {
                    const d = Phaser.Math.Distance.Between(player.x, player.y, body.position.x, body.position.y);
                    if (d < minDist && body.position.y < player.y) {
                        minDist = d;
                        nearest = body;
                    }
                }
            });

            if (nearest) {
                player.isGrappling = true;
                player.anchor = nearest.position;
                player.constraint = scene.matter.add.constraint(player.body, nearest, minDist * 0.8, 0.1);
            }
        }

        function stopGrapple(scene) {
            if (player.isGrappling) {
                player.isGrappling = false;
                if (player.constraint) {
                    scene.matter.world.removeConstraint(player.constraint);
                    player.constraint = null;
                }
                player.setVelocity(player.body.velocity.x * 1.5, player.body.velocity.y);
            }
        }
    </script>
</body>

</html>
